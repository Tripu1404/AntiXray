name: Build and Release AntiXray

on:
  push:
    branches: [ "master", "main" ]
    tags:
      - 'v*' # Se activa al subir tags como v1.0, v2.0, etc.
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Download Nukkit API
        run: |
          # Descarga la última build estable de la API de Nukkit
          curl -L -o nukkit.jar https://github.com/PetteriM1/NukkitPetteriM1Edition/releases/download/4385/Nukkit-PM1E.jar

      - name: Prepare build directory
        run: mkdir -p out

      - name: Compile with javac
        run: |
          # Compila todos los archivos .java usando nukkit.jar como dependencia
          # Se asume que los archivos están en la raíz o subcarpetas
          find . -name "*.java" > sources.txt
          javac -d out -cp nukkit.jar @sources.txt

      - name: Package JAR
        run: |
          # Incluye el plugin.yml en el JAR final
          if [ -f "plugin.yml" ]; then cp plugin.yml out/; fi
          cd out && jar cvf ../AntiXray.jar .

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: AntiXray-Build
          path: AntiXray.jar

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: AntiXray.jar
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
